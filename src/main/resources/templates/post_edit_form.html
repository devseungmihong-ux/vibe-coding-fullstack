<!DOCTYPE html>
<html class="dark" lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Vibe Coding | Edit Post</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0d59f2",
                        "background-light": "#f5f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
        }

        .glass-nav {
            background: rgba(16, 22, 34, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .hero-gradient {
            background: radial-gradient(circle at 50% 50%, rgba(13, 89, 242, 0.15) 0%, rgba(16, 22, 34, 1) 70%);
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased selection:bg-primary/30 min-h-screen">
    <nav class="fixed top-0 w-full z-50 glass-nav">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-3 group cursor-pointer" onclick="location.href='/'">
                <div class="p-2 bg-primary rounded-lg text-white">
                    <span class="material-symbols-outlined block">terminal</span>
                </div>
                <span class="text-xl font-bold tracking-tight text-slate-900 dark:text-white">Vibe Coding</span>
            </div>
            <div class="hidden md:flex items-center gap-10">
                <a class="text-sm font-medium hover:text-primary transition-colors" href="/">Home</a>
                <a class="text-sm font-medium hover:text-primary transition-colors" href="/posts">Posts</a>
                <a class="text-sm font-medium hover:text-primary transition-colors" href="#">Community</a>
            </div>
        </div>
    </nav>

    <main class="relative pt-32 pb-20 overflow-hidden min-h-screen">
        <div class="absolute inset-0 z-0 pointer-events-none">
            <div class="hero-gradient absolute inset-0"></div>
            <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary/20 blur-[120px] rounded-full"></div>
            <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-indigo-500/10 blur-[120px] rounded-full"></div>
        </div>

        <div class="relative z-10 max-w-4xl mx-auto px-6 w-full">
            <div class="mb-8">
                <h1 class="text-4xl font-bold tracking-tight text-white mb-2">Edit Post</h1>
                <p class="text-slate-400 text-lg">Modify the post details below.</p>
            </div>

            <div class="bg-slate-900/50 rounded-2xl border border-white/10 backdrop-blur-sm p-8 shadow-2xl">
                <form id="editForm" class="space-y-6" th:action="@{/posts/{no}/save(no=${post.no})}" method="post">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-bold text-slate-400 mb-2">Post No.</label>
                            <input type="text" th:value="${post.no}" readonly
                                class="w-full bg-slate-800/50 border-white/10 rounded-lg text-slate-500 cursor-not-allowed focus:ring-0 focus:border-white/10" />
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-400 mb-2">Views</label>
                            <input type="text" th:value="${post.views}" readonly
                                class="w-full bg-slate-800/50 border-white/10 rounded-lg text-slate-500 cursor-not-allowed focus:ring-0 focus:border-white/10" />
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-400 mb-2">Created At</label>
                            <input type="text" th:value="${#temporals.format(post.createdAt, 'yyyy-MM-dd')}" readonly
                                class="w-full bg-slate-800/50 border-white/10 rounded-lg text-slate-500 cursor-not-allowed focus:ring-0 focus:border-white/10" />
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-400 mb-2">Updated At</label>
                            <input type="text"
                                th:value="${post.updatedAt != null ? #temporals.format(post.updatedAt, 'yyyy-MM-dd') : ''}"
                                readonly
                                class="w-full bg-slate-800/50 border-white/10 rounded-lg text-slate-500 cursor-not-allowed focus:ring-0 focus:border-white/10" />
                        </div>
                    </div>

                    <div>
                        <label for="title" class="block text-sm font-bold text-slate-400 mb-2">Title</label>
                        <input type="text" id="title" name="title" th:value="${post.title}" required
                            class="w-full bg-slate-800/50 border-white/10 rounded-lg text-white focus:ring-primary focus:border-primary transition-all" />
                    </div>

                    <div>
                        <label for="content" class="block text-sm font-bold text-slate-400 mb-2">Content</label>
                        <textarea id="content" name="content" rows="10" th:text="${post.content}" required
                            class="w-full bg-slate-800/50 border-white/10 rounded-lg text-white focus:ring-primary focus:border-primary transition-all"></textarea>
                    </div>

                    <div class="flex items-center justify-end gap-4 pt-4">
                        <button type="button" th:onclick="|location.href='/posts/${post.no}'|"
                            class="px-6 py-2 rounded-lg text-sm font-bold text-slate-400 hover:text-white hover:bg-white/5 transition-all">
                            Cancel
                        </button>
                        <button type="submit"
                            class="px-8 py-2 bg-primary hover:bg-primary/90 text-white rounded-lg text-sm font-bold transition-all shadow-lg shadow-primary/20">
                            Save Changes
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>


</body>

</html>
