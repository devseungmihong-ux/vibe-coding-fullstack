<!DOCTYPE html>
<html class="dark" lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Vibe Coding | Post List</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0d59f2",
                        "background-light": "#f5f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
        }

        .glass-nav {
            background: rgba(16, 22, 34, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .hero-gradient {
            background: radial-gradient(circle at 50% 50%, rgba(13, 89, 242, 0.15) 0%, rgba(16, 22, 34, 1) 70%);
        }

        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined' !important;
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-smoothing: antialiased;
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased selection:bg-primary/30 min-h-screen">
    <nav class="fixed top-0 w-full z-50 glass-nav">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-3 group cursor-pointer" onclick="location.href='/'">
                <div class="p-2 bg-primary rounded-lg text-white">
                    <span class="material-symbols-outlined block">terminal</span>
                </div>
                <span class="text-xl font-bold tracking-tight text-slate-900 dark:text-white">Vibe Coding</span>
            </div>
            <div class="hidden md:flex items-center gap-10">
                <a class="text-sm font-medium hover:text-primary transition-colors" href="/">Home</a>
                <a class="text-sm font-medium text-primary" href="/posts">Posts</a>
                <a class="text-sm font-medium hover:text-primary transition-colors" href="#">Community</a>
            </div>
        </div>
    </nav>

    <main class="relative pt-24 pb-12 overflow-hidden min-h-screen">
        <div class="absolute inset-0 z-0 pointer-events-none">
            <div class="hero-gradient absolute inset-0"></div>
            <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary/20 blur-[120px] rounded-full"></div>
            <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-indigo-500/10 blur-[120px] rounded-full"></div>
        </div>

        <div class="relative z-10 max-w-7xl mx-auto px-6 w-full">
            <div class="mb-8 flex items-center justify-between">
                <div>
                    <h1 class="text-3xl lg:text-4xl font-bold tracking-tight text-white mb-2">Post List</h1>
                    <p class="text-slate-400 text-base">Explore our shared community knowledge and stories.</p>
                </div>
                <button onclick="location.href='/posts/new'"
                    class="bg-primary hover:bg-primary/90 text-white px-5 py-2.5 rounded-xl text-sm font-bold shadow-lg shadow-primary/20 transition-all">
                    New Post
                </button>
            </div>

            <div class="relative overflow-hidden bg-slate-900/50 rounded-2xl border border-white/10 backdrop-blur-sm">
                <table class="w-full text-left">
                    <thead>
                        <tr class="border-b border-white/10 bg-slate-800/50">
                            <th class="px-6 py-3 text-xs font-bold text-slate-300 uppercase tracking-widest">No</th>
                            <th class="px-6 py-3 text-xs font-bold text-slate-300 uppercase tracking-widest">Title</th>
                            <th class="px-6 py-3 text-xs font-bold text-slate-300 uppercase tracking-widest">Created At
                            </th>
                            <th class="px-6 py-3 text-xs font-bold text-slate-300 uppercase tracking-widest">Views</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-white/5">
                        <tr th:each="post : ${posts}" class="hover:bg-white/5 transition-colors group">
                            <td class="px-6 py-3 text-slate-400 font-mono text-sm" th:text="${post.no}">1</td>
                            <td class="px-6 py-3">
                                <a th:href="@{'/posts/' + ${post.no}}"
                                    class="text-white font-medium group-hover:text-primary transition-colors underline-offset-4 hover:underline text-sm"
                                    th:text="${post.title}">Title here</a>
                            </td>
                            <td class="px-6 py-3 text-slate-400 text-xs"
                                th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">2023-01-01</td>
                            <td class="px-6 py-3">
                                <div
                                    class="inline-flex items-center gap-1.5 px-2 py-0.5 rounded bg-slate-800 text-[10px] font-bold text-slate-400">
                                    <span class="material-symbols-outlined text-[12px]">visibility</span>
                                    <span th:text="${post.views}">100</span>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="h-28"></div>
        </div>
    </main>

    <!-- Fixed Bottom Pagination Navigation -->
    <div th:if="${totalPages > 1}"
        style="position: fixed !important; bottom: 0 !important; left: 0 !important; width: 100% !important; z-index: 9999 !important; height: 80px !important; display: flex !important; align-items: center !important; justify-content: center !important; gap: 20px !important;"
        class="px-6 bg-slate-900/95 backdrop-blur-3xl border-t border-white/10 shadow-[0_-15px_40px_rgba(0,0,0,0.6)]">

        <!-- Previous Button -->
        <a th:href="@{/posts(page=${currentPage - 1})}"
            th:classappend="${currentPage == 1} ? 'pointer-events-none opacity-20' : 'hover:bg-primary/20 hover:text-primary active:scale-95 border-white/20'"
            class="flex items-center justify-center w-10 h-10 rounded-lg bg-slate-800 border border-white/10 text-slate-300 transition-all duration-300">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="m15 18-6-6 6-6" />
            </svg>
        </a>

        <!-- Page Numbers -->
        <div class="flex items-center gap-2">
            <a th:each="pageNum : ${#numbers.sequence(1, totalPages)}" th:href="@{/posts(page=${pageNum})}"
                th:text="${pageNum}"
                th:classappend="${pageNum == currentPage} ? 'bg-primary text-white border-primary shadow-lg shadow-primary-500/20 scale-110' : 'bg-slate-800/50 border-white/10 text-slate-400 hover:bg-white/10 active:scale-95'"
                class="w-9 h-9 flex items-center justify-center rounded-lg border text-sm font-bold transition-all duration-300">
                1
            </a>
        </div>

        <!-- Next Button -->
        <a th:href="@{/posts(page=${currentPage + 1})}"
            th:classappend="${currentPage == totalPages} ? 'pointer-events-none opacity-20' : 'hover:bg-primary/20 hover:text-primary active:scale-95 border-white/20'"
            class="flex items-center justify-center w-10 h-10 rounded-lg bg-slate-800 border border-white/10 text-slate-300 transition-all duration-300">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="m9 18 6-6-6-6" />
            </svg>
        </a>
    </div>
</body>

</html>
